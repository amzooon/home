<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettagli del Prodotto📄</title>
    <link rel="icon" type="image/png" href="Pacco.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color:  #00b356;
        }
        .product-details {
            max-width: 800px;
            margin: 100px auto;
            background-color: white;
            padding: 20px;
            box-shadow: 0 2px 2000px #00ff37d3;
            border: 5px solid;
            border-radius: 45px;
        }
        .product-details img {
            max-width: 100%;
        }
        .product-title {
            font-size: 24px;
            margin: 10px 0;
        }
        .product-description {
            font-size: 16px;
            margin: 10px 0;
        }
        .product-price {
            font-size: 20px;
            margin: 10px 0;
        }
        .buy-button {
            display: block;
            padding: 10px 20px;
            background-color: #1697ed;
            color: white;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            margin-top: 10px;
        }
        .neon-text {
    color: rgb(0, 0, 0);
    /* Applichiamo un'ombra di luce con un colore fisso e un effetto arcobaleno */
    text-shadow: 0 0 10px red, 0 0 20px orange, 0 0 30px yellow, 0 0 40px green, 0 0 50px blue, 0 0 60px indigo, 0 0 70px violet, 0 0 80px red, 0 0 90px orange;
    /* Avviamo un'animazione per far scorrere l'effetto neon attraverso i colori dell'arcobaleno */
    animation: rainbow-animation 5s linear infinite;
    font-size: 24px
}

/* Definiamo l'animazione per far scorrere l'effetto neon attraverso i colori dell'arcobaleno */
@keyframes rainbow-animation {
    0% {
        text-shadow: 0 0 10px red, 0 0 20px orange, 0 0 30px yellow, 0 0 40px green, 0 0 50px blue, 0 0 60px indigo, 0 0 70px violet, 0 0 80px red, 0 0 90px orange;
    }
    14.3% {
        text-shadow: 0 0 10px orange, 0 0 20px yellow, 0 0 30px green, 0 0 40px blue, 0 0 50px indigo, 0 0 60px violet, 0 0 70px red, 0 0 80px orange, 0 0 90px yellow;
    }
    28.6% {
        text-shadow: 0 0 10px yellow, 0 0 20px green, 0 0 30px blue, 0 0 40px indigo, 0 0 50px violet, 0 0 60px red, 0 0 70px orange, 0 0 80px yellow, 0 0 90px green;
    }
    42.9% {
        text-shadow: 0 0 10px green, 0 0 20px blue, 0 0 30px indigo, 0 0 40px violet, 0 0 50px red, 0 0 60px orange, 0 0 70px yellow, 0 0 80px green, 0 0 90px blue;
    }
    57.2% {
        text-shadow: 0 0 10px blue, 0 0 20px indigo, 0 0 30px violet, 0 0 40px red, 0 0 50px orange, 0 0 60px yellow, 0 0 70px green, 0 0 80px blue, 0 0 90px indigo;
    }
    71.5% {
        text-shadow: 0 0 10px indigo, 0 0 20px violet, 0 0 30px red, 0 0 40px orange, 0 0 50px yellow, 0 0 60px green, 0 0 70px blue, 0 0 80px indigo, 0 0 90px violet;
    }
    85.8% {
        text-shadow: 0 0 10px violet, 0 0 20px red, 0 0 30px orange, 0 0 40px yellow, 0 0 50px green, 0 0 60px blue, 0 0 70px indigo, 0 0 80px violet, 0 0 90px red;
    }
    100% {
        text-shadow: 0 0 10px red, 0 0 20px orange, 0 0 30px yellow, 0 0 40px green, 0 0 50px blue, 0 0 60px indigo, 0 0 70px violet, 0 0 80px red, 0 0 90px orange;
    }
}
        
    </style>
</head>
<body>
    <div class="product-details">
        <img src="1.jpg" alt="Product 1">
        <h1 class="product-title">Prodotto Fantastico 🏆🏆TOP 4 PRODOTTI PIÙ ACQUISTATI 🏆🏆</h1>
        <p class="product-description">
            Questo è un prodotto fantastico con caratteristiche incredibili.
            <p class="neon-text">Codice Prodotto*:  G45H733</p>  
        <p class="product-price">Prezzo: €9.99</p>
        <a href="Modulo" class="buy-button">Acquista Ora</a>
    </div>
</body>
</html>
